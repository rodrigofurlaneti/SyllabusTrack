name: CI — Build, Test & Docker

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "9.0.x"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/syllabustrack-api
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/syllabustrack-frontend

jobs:

  # ── Backend: Build + Testes ────────────────────────────────────────────────
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Debug — listar estrutura do repositório
        run: |
          echo "=== Raiz do repositório ==="
          ls -la
          echo "=== Arquivos .sln encontrados ==="
          find . -name "*.sln" 2>/dev/null || echo "Nenhum .sln encontrado"
          echo "=== Arquivos .csproj encontrados ==="
          find . -name "*.csproj" 2>/dev/null || echo "Nenhum .csproj encontrado"

      - name: Restore dependencies
        run: dotnet restore BackEnd/SyllabusTrack/SyllabusTrack.sln

      - name: Build
        run: dotnet build BackEnd/SyllabusTrack/SyllabusTrack.sln --no-restore -c Release

      - name: Run tests
        run: >
          dotnet test BackEnd/SyllabusTrack/SyllabusTrack.sln
          --no-build -c Release --verbosity normal
          --logger "trx;LogFileName=results.trx"
          --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-backend
          path: TestResults/*.trx

  # ── Frontend: Build + Lint ─────────────────────────────────────────────────
  frontend:
    name: Frontend — Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: FrontEnd/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: FrontEnd

      - name: Lint
        run: npm run lint
        working-directory: FrontEnd

      - name: Build
        run: npm run build
        working-directory: FrontEnd
        env:
          VITE_API_URL: ""

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: FrontEnd/dist/
          retention-days: 7

  # ── Docker: Build & Push (apenas no push para main) ───────────────────────
  docker:
    name: Docker — Build & Push
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (API)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata (Frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push API image
        uses: docker/build-push-action@v5
        with:
          context: ./BackEnd/SyllabusTrack
          file: ./BackEnd/SyllabusTrack/SyllabusTrack.API/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./FrontEnd
          file: ./FrontEnd/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_URL=
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Resumo ─────────────────────────────────────────────────────────────────
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()

    steps:
      - name: Report status
        run: |
          echo "## CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Build & Test | ${{ needs.backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Build & Lint | ${{ needs.frontend.result }} |" >> $GITHUB_STEP_SUMMARY
